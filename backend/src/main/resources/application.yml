spring:
  application:
    name: recruittrack-backend

  profiles:
    active: ${APP_ENV:dev}

  # ─── DATABASE ──────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:recruittrack}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: RecruitTrackPool
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 1800000
      keepalive-time: 60000
      connection-test-query: SELECT 1

  # ─── JPA / HIBERNATE ───────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        jdbc:
          time_zone: UTC

  # ─── JACKSON ───────────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: NON_NULL
    time-zone: UTC

# ─── SERVER ────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

# ─── APPLICATION PROPERTIES ─────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    issuer: ${JWT_ISSUER:recruittrack.io}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  bootstrap:
    admin-email: ${ADMIN_EMAIL:admin@recruittrack.io}
    admin-password: ${ADMIN_PASSWORD:Demo@123}
    admin-first-name: ${ADMIN_FIRST_NAME:System}
    admin-last-name: ${ADMIN_LAST_NAME:Admin}

# ─── ACTUATOR ──────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: never
  info:
    env:
      enabled: true

info:
  app:
    name: RecruitTrack
    version: 1.0.0

# ─── SPRINGDOC ─────────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
